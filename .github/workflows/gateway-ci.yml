name: YARP Gateway CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/YarpGateway/**' # Only run if the Gateway changes
  pull_request:
    branches: [ main ]
    paths:
      - 'src/YarpGateway/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    - name: Restore dependencies
      run: dotnet restore src/YarpGateway.csproj

    - name: Build
      run: dotnet build src/YarpGateway.csproj --no-restore --configuration Release