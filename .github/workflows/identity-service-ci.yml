name: Identity Service CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/IdentityService/**' # Trigger only for Identity Service changes
  pull_request:
    branches: [ main ]
    paths:
      - 'src/IdentityService/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    - name: Restore dependencies
      run: dotnet restore src/IdentityService/IdentityService.csproj

    - name: Build
      run: dotnet build src/IdentityService/IdentityService.csproj --no-restore --configuration Release